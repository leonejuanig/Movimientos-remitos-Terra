<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporadas · Terra Más / Terra Salto</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f0e; --surface:#141716; --surface2:#1c201e; --border:#2a2e2c;
  --green:#4ade80; --yellow:#fbbf24; --red:#f87171; --blue:#60a5fa; --purple:#a78bfa;
  --text:#e8ede9; --text-dim:#6b7c6e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"DM Mono",monospace;min-height:100vh;padding:28px 24px;}

/* HEADER */
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
.header-left span{font-size:.7rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;display:block;margin-bottom:4px;}
.header-left h1{font-family:"Syne",sans-serif;font-size:2rem;font-weight:800;letter-spacing:-.03em;line-height:1;}
.today{background:var(--surface2);border:1px solid var(--border);padding:7px 14px;font-size:.68rem;color:var(--text-dim);letter-spacing:.08em;}

/* COMPANY SWITCHER */
.company-bar{display:flex;gap:1px;background:var(--border);margin-bottom:28px;}
.company-btn{flex:1;background:var(--surface);border:none;color:var(--text-dim);font-family:"Syne",sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.05em;padding:14px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.company-btn:hover{background:var(--surface2);color:var(--text);}
.company-btn.active-tm{background:var(--green);color:#000;}
.company-btn.active-ts{background:var(--purple);color:#000;}
.company-btn.active-all{background:var(--yellow);color:#000;}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--border);margin-bottom:28px;}
.stat{background:var(--surface);padding:16px 20px;}
.stat-label{font-size:.6rem;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:"Syne",sans-serif;font-size:1.6rem;font-weight:800;}
.cv{color:var(--green);}.cy{color:var(--yellow);}.cr{color:var(--red);}.cb{color:var(--blue);}.cp{color:var(--purple);}

/* MONTHS */
.months-nav{display:flex;gap:1px;background:var(--border);margin-bottom:24px;}
.month-btn{flex:1;background:var(--surface);border:none;color:var(--text-dim);font-family:"DM Mono",monospace;font-size:.62rem;letter-spacing:.06em;padding:9px 3px;cursor:pointer;transition:background .15s,color .15s;text-transform:uppercase;line-height:1.4;}
.month-btn:hover{background:var(--surface2);color:var(--text);}
.month-btn.active-tm{background:var(--green);color:#000;font-weight:700;}
.month-btn.active-ts{background:var(--purple);color:#000;font-weight:700;}
.month-btn.active-all{background:var(--yellow);color:#000;font-weight:700;}
.month-btn.today-mark{outline:2px solid var(--green);outline-offset:-2px;}

/* FILTERS */
.filters{display:flex;gap:16px;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;padding:14px 16px;background:var(--surface);border:1px solid var(--border);}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-label{font-size:.58rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
.filter-group select, .filter-group input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:"DM Mono",monospace;font-size:.7rem;padding:6px 10px;outline:none;}
.filter-group input{width:200px;}
.filter-group select:focus, .filter-group input:focus{border-color:var(--green);}

/* TABS */
.tab-bar{display:flex;gap:1px;background:var(--border);margin-bottom:20px;}
.tab{background:var(--surface);border:none;color:var(--text-dim);font-family:"DM Mono",monospace;font-size:.68rem;letter-spacing:.08em;padding:11px 22px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.tab.active{background:var(--surface2);color:var(--text);}

/* SECTION TITLE */
.section-title{font-family:"Syne",sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:"";flex:1;height:1px;background:var(--border);}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--border);margin-bottom:32px;}
.card{background:var(--surface);padding:18px;position:relative;overflow:hidden;cursor:pointer;transition:background .15s;}
.card:hover{background:var(--surface2);}
.card.expanded{background:var(--surface2);}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;}
.card.lh::before{background:var(--red);}
.card.lm::before{background:var(--yellow);}
.card.ll::before{background:var(--green);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-name{font-family:"Syne",sans-serif;font-size:.82rem;font-weight:700;line-height:1.3;flex:1;margin-right:10px;}
.badge{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;flex-shrink:0;}
.badge.h{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.badge.m{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.3);}
.badge.l{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.card-meta{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
.meta-item{}
.meta-label{font-size:.57rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;}
.meta-value{font-size:.82rem;}
.meta-value.acc{color:var(--yellow);}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.progress-fill{height:100%;border-radius:2px;}
.mini-chart{display:flex;align-items:flex-end;gap:2px;height:36px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bar{width:100%;background:var(--surface2);border-radius:1px;min-height:2px;}
.bar.peak{background:var(--yellow);}
.bar.cur{background:var(--green);}
.bar-lbl{font-size:.52rem;color:var(--text-dim);}

/* EXPAND */
.card-expand{display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.card-expand.open{display:block;}
.exp-table{width:100%;border-collapse:collapse;font-size:.65rem;}
.exp-table th{color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;padding:4px 7px;text-align:left;border-bottom:1px solid var(--border);font-weight:400;}
.exp-table td{padding:4px 7px;border-bottom:1px solid rgba(255,255,255,.03);}
.exp-table tr.peak-row td{color:var(--yellow);}
.exp-table tr.cur-row td{color:var(--green);}
.exp-bar{height:3px;background:var(--surface);border-radius:2px;margin-top:3px;}
.exp-bar-fill{height:100%;border-radius:2px;}

/* TABLE */
.table-wrap{overflow-x:auto;margin-bottom:32px;}
table{width:100%;border-collapse:collapse;font-size:.7rem;}
thead tr{background:var(--surface2);}
th{padding:9px 14px;text-align:left;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;font-size:.6rem;font-weight:400;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:9px 14px;border-bottom:1px solid var(--border);}
tr:hover td{background:rgba(255,255,255,.02);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;}
.dot.h{background:var(--red);}.dot.m{background:var(--yellow);}.dot.l{background:var(--green);}
.empty{text-align:center;padding:48px;color:var(--text-dim);font-size:.78rem;grid-column:1/-1;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>Terra Más &amp; Terra Salto · Insumos Agrícolas</span>
    <h1>Temporadas de Productos</h1>
  </div>
  <div class="today" id="todayBadge"></div>
</div>

<!-- Company selector -->
<div class="company-bar">
  <button class="company-btn active-tm" id="btnTM" onclick="setEmpresa('TERRA MAS')">Terra Más</button>
  <button class="company-btn" id="btnTS" onclick="setEmpresa('TERRA SALTO')">Terra Salto</button>
  <button class="company-btn" id="btnALL" onclick="setEmpresa('AMBAS')">Ambas</button>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="months-nav" id="monthsNav"></div>

<div class="filters">
  <div class="filter-group">
    <div class="filter-label">Buscar artículo</div>
    <input id="searchInput" oninput="onSearch()" placeholder="ej: roundup, latium...">
  </div>
  <div class="filter-group">
    <div class="filter-label">Ordenar por</div>
    <select id="sortMode" onchange="render()">
      <option value="volume">Mayor volumen</option>
      <option value="peak">Pico en mes seleccionado</option>
      <option value="season">Más estacional</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Mostrar</div>
    <select id="filterActive" onchange="render()">
      <option value="active">Con movimiento este mes</option>
      <option value="all">Todos los artículos</option>
    </select>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" id="tabBtnCards" onclick="switchTab('cards')">Tarjetas</button>
  <button class="tab" id="tabBtnTable" onclick="switchTab('table')">Tabla</button>
</div>

<div id="tabCards">
  <div class="section-title" id="sectionTitle"></div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>
<div id="tabTable" style="display:none">
  <div class="section-title">Ranking de productos</div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortTable('desc')">Artículo</th>
        <th onclick="sortTable('monthPct')">% mes actual</th>
        <th onclick="sortTable('monthQty')">Cant. mes actual</th>
        <th onclick="sortTable('total')">Total anual</th>
        <th onclick="sortTable('peakMonth')">Pico anual</th>
        <th>Estacionalidad</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

var now = new Date();
document.getElementById("todayBadge").textContent = now.toLocaleDateString("es-AR",{weekday:"short",year:"numeric",month:"short",day:"numeric"}).toUpperCase();

function getActiveColor() {
  return empresa === "TERRA MAS" ? "active-tm" : empresa === "TERRA SALTO" ? "active-ts" : "active-all";
}

function setEmpresa(e) {
  empresa = e;
  expandedCard = null;
  document.getElementById("btnTM").className = "company-btn" + (e==="TERRA MAS" ? " active-tm" : "");
  document.getElementById("btnTS").className = "company-btn" + (e==="TERRA SALTO" ? " active-ts" : "");
  document.getElementById("btnALL").className = "company-btn" + (e==="AMBAS" ? " active-all" : "");
  render();
}

function getProducts() {
  if (empresa === "AMBAS") {
    // Merge both companies
    var map = {};
    ["TERRA MAS","TERRA SALTO"].forEach(function(emp) {
      (RAW[emp] || []).forEach(function(p) {
        if (!map[p.desc]) map[p.desc] = {desc:p.desc, monthly:new Array(12).fill(0), total:0, peakMonth:1, peakPct:0, seasonIdx:0};
        for (var i=0;i<12;i++) map[p.desc].monthly[i] += p.monthly[i];
        map[p.desc].total += p.total;
      });
    });
    return Object.values(map).map(function(p) {
      var peak = p.monthly.indexOf(Math.max.apply(null,p.monthly));
      var top3 = p.monthly.slice().sort(function(a,b){return b-a;}).slice(0,3).reduce(function(a,b){return a+b;},0);
      p.peakMonth = peak+1;
      p.peakPct = p.total>0 ? Math.round(p.monthly[peak]/p.total*100) : 0;
      p.seasonIdx = p.total>0 ? Math.round(top3/p.total*100) : 0;
      return p;
    });
  }
  return RAW[empresa] || [];
}

function getFiltered() {
  var prods = getProducts();
  var sort = document.getElementById("sortMode").value;
  var filterActive = document.getElementById("filterActive").value;

  // Add month metrics
  prods = prods.map(function(p) {
    var mq = p.monthly[selMonth-1];
    var mp = p.total>0 ? Math.round(mq/p.total*100) : 0;
    return Object.assign({},p,{monthQty:mq, monthPct:mp});
  });

  // Filter by search
  if (searchQ) prods = prods.filter(function(p){ return p.desc.toLowerCase().indexOf(searchQ)>=0; });

  // Filter active/all — skip if searching (show all matching products)
  if (!searchQ && filterActive === "active") prods = prods.filter(function(p){ return p.monthQty > 0; });

  // Sort
  if (sort === "volume") prods.sort(function(a,b){ return b.total-a.total; });
  else if (sort === "peak") prods.sort(function(a,b){ return b.monthPct-a.monthPct; });
  else prods.sort(function(a,b){ return b.seasonIdx-a.seasonIdx; });

  return prods;
}

function lvl(pct){ return pct>=40?"h":pct>=20?"m":"l"; }
function lvlLabel(pct){ return pct>=40?"🔴 ALTA":pct>=20?"🟡 MEDIA":"🟢 BAJA"; }
function lvlColor(l){ return l==="h"?"#f87171":l==="m"?"#fbbf24":"#4ade80"; }

function onSearch() {
  searchQ = document.getElementById("searchInput").value.toLowerCase().trim();
  expandedCard = null;
  render();
}

function render() {
  renderStats();
  renderMonthsNav();
  renderTab();
}

function renderStats() {
  var prods = getFiltered();
  var allProds = getProducts();
  var high = prods.filter(function(p){ return lvl(p.monthPct)==="h"; }).length;
  var med  = prods.filter(function(p){ return lvl(p.monthPct)==="m"; }).length;
  var totalMes = prods.reduce(function(s,p){ return s+p.monthQty; },0);

  document.getElementById("statsBar").innerHTML =
    "<div class=\"stat\"><div class=\"stat-label\">Artículos totales</div><div class=\"stat-value cb\">"+allProds.length+"</div></div>" +
    "<div class=\"stat\"><div class=\"stat-label\">Activos en "+MESES[selMonth-1]+"</div><div class=\"stat-value\">"+prods.filter(function(p){return p.monthQty>0;}).length+"</div></div>" +
    "<div class=\"stat\"><div class=\"stat-label\">Alta temporada</div><div class=\"stat-value cr\">"+high+"</div></div>" +
    "<div class=\"stat\"><div class=\"stat-label\">Temp. media</div><div class=\"stat-value cy\">"+med+"</div></div>" +
    "<div class=\"stat\"><div class=\"stat-label\">Vol. total mes</div><div class=\"stat-value cv\">"+Math.round(totalMes).toLocaleString("es-AR")+"</div></div>";
}

function renderMonthsNav() {
  var ac = getActiveColor();
  var curReal = new Date().getMonth()+1;
  var html = "";
  for (var i=0;i<12;i++) {
    var mn = i+1;
    var cnt = getProducts().filter(function(p){
      var mq = p.monthly[mn-1];
      var mp = p.total>0 ? mq/p.total*100 : 0;
      return mq>0 && mp>=20;
    }).length;
    var cls = (mn===selMonth ? ac : "") + (mn===curReal && mn!==selMonth ? " today-mark" : "");
    html += "<button class=\"month-btn "+cls+"\" onclick=\"selMonth="+mn+";expandedCard=null;render()\">"+MESES[i]+(cnt>0?"<br>·"+cnt:"")+"</button>";
  }
  document.getElementById("monthsNav").innerHTML = html;
}

function switchTab(tab) {
  curTab = tab;
  document.getElementById("tabBtnCards").className = "tab"+(tab==="cards"?" active":"");
  document.getElementById("tabBtnTable").className = "tab"+(tab==="table"?" active":"");
  document.getElementById("tabCards").style.display = tab==="cards"?"block":"none";
  document.getElementById("tabTable").style.display = tab==="table"?"block":"none";
  renderTab();
}

function renderTab() {
  if (curTab==="cards") renderCards(); else renderTable();
}

function toggleCard(desc) {
  expandedCard = expandedCard===desc ? null : desc;
  renderCards();
}

function renderCards() {
  var prods = getFiltered();
  var filterActive = document.getElementById("filterActive").value;
  var title = searchQ
    ? "Resultados para \""+searchQ+"\" · "+prods.length+" artículos"
    : (filterActive==="active"
        ? "Activos en "+MESES_F[selMonth-1]+" · "+prods.length+" artículos"
        : "Todos los artículos · "+prods.length);
  document.getElementById("sectionTitle").textContent = title;

  if (prods.length===0) {
    document.getElementById("cardsGrid").innerHTML = "<div class=\"empty\">Sin resultados</div>";
    return;
  }

  var allM = getProducts().map(function(p){return p.monthly;});
  var maxQty = 0;
  allM.forEach(function(m){ m.forEach(function(v){ if(v>maxQty)maxQty=v; }); });

  var html = "";
  prods.forEach(function(p) {
    var l = lvl(p.monthPct);
    var isExp = expandedCard===p.desc;
    var safeDesc = p.desc.replace(/\\/g,"\\\\").replace(/'/g,"\\'");

    var bars = "";
    for (var i=0;i<12;i++) {
      var h = maxQty>0 ? Math.max(2,Math.round(p.monthly[i]/maxQty*34)) : 2;
      var bc = (i+1===selMonth)?"cur":(i+1===p.peakMonth?"peak":"");
      bars += "<div class=\"bar-wrap\"><div class=\"bar "+bc+"\" style=\"height:"+h+"px\"></div><div class=\"bar-lbl\">"+MESES[i][0]+"</div></div>";
    }

    // Expand table
    var expHtml = "<div class=\"card-expand"+(isExp?" open":"")+"\">";
    expHtml += "<table class=\"exp-table\"><thead><tr><th>Mes</th><th>Cantidad</th><th>% del año</th><th></th></tr></thead><tbody>";
    var maxMv = Math.max.apply(null, p.monthly);
    for (var mi=0;mi<12;mi++) {
      var mv = p.monthly[mi];
      var mp2 = p.total>0 ? Math.round(mv/p.total*100) : 0;
      var rowCls = (mi+1===p.peakMonth)?"peak-row":(mi+1===selMonth?"cur-row":"");
      var bw = maxMv>0 ? Math.round(mv/maxMv*100) : 0;
      var bc2 = (mi+1===p.peakMonth)?"#fbbf24":(mi+1===selMonth?"#4ade80":"#4a5c4e");
      expHtml += "<tr class=\""+rowCls+"\"><td>"+MESES_F[mi]+"</td><td>"+mv.toLocaleString("es-AR",{maximumFractionDigits:1})+"</td><td>"+mp2+"%</td><td style=\"width:70px\"><div class=\"exp-bar\"><div class=\"exp-bar-fill\" style=\"width:"+bw+"%;background:"+bc2+"\"></div></div></td></tr>";
    }
    expHtml += "</tbody></table></div>";

    html += "<div class=\"card l"+l+(isExp?" expanded":"")+"\" onclick=\"toggleCard('"+safeDesc+"')\">"+
      "<div class=\"card-header\"><div class=\"card-name\">"+p.desc+"</div><div class=\"badge "+l+"\">"+lvlLabel(p.monthPct)+"</div></div>"+
      "<div class=\"card-meta\">"+
        "<div class=\"meta-item\"><div class=\"meta-label\">Este mes</div><div class=\"meta-value acc\">"+p.monthQty.toLocaleString("es-AR",{maximumFractionDigits:1})+" u</div></div>"+
        "<div class=\"meta-item\"><div class=\"meta-label\">% del año</div><div class=\"meta-value\">"+p.monthPct+"%</div></div>"+
        "<div class=\"meta-item\"><div class=\"meta-label\">Pico en</div><div class=\"meta-value\">"+MESES[p.peakMonth-1]+" ("+p.peakPct+"%)</div></div>"+
        "<div class=\"meta-item\"><div class=\"meta-label\">Total anual</div><div class=\"meta-value\">"+Math.round(p.total).toLocaleString("es-AR")+"</div></div>"+
      "</div>"+
      "<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:"+Math.min(100,p.monthPct)+"%;background:"+lvlColor(l)+"\"></div></div>"+
      "<div class=\"mini-chart\">"+bars+"</div>"+
      expHtml+
      "</div>";
  });
  document.getElementById("cardsGrid").innerHTML = html;
}

function sortTable(col) {
  if (tableSortCol===col) tableSortAsc=!tableSortAsc;
  else { tableSortCol=col; tableSortAsc=false; }
  renderTable();
}

function renderTable() {
  var prods = getFiltered();
  prods.sort(function(a,b){
    var av = a[tableSortCol]||0, bv = b[tableSortCol]||0;
    if (typeof av==="string") return tableSortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return tableSortAsc ? av-bv : bv-av;
  });
  var html = "";
  prods.forEach(function(p) {
    var l = lvl(p.monthPct);
    var prox = selMonth===p.peakMonth?"ES EL PICO":Math.abs(selMonth-p.peakMonth)<=1?"CERCA DEL PICO":MESES_F[p.peakMonth-1];
    var seasonBar = "<div style=\"width:60px;display:inline-block;vertical-align:middle;margin-left:6px\"><div style=\"height:3px;background:var(--surface2);border-radius:2px\"><div style=\"height:100%;width:"+Math.min(100,p.seasonIdx)+"%;background:#60a5fa;border-radius:2px\"></div></div></div>";
    html += "<tr><td><span class=\"dot "+l+"\"></span>"+p.desc+"</td>"+
      "<td>"+p.monthPct+"%</td>"+
      "<td>"+p.monthQty.toLocaleString("es-AR",{maximumFractionDigits:1})+"</td>"+
      "<td>"+Math.round(p.total).toLocaleString("es-AR")+"</td>"+
      "<td>"+MESES_F[p.peakMonth-1]+"</td>"+
      "<td>"+p.seasonIdx+"%"+seasonBar+"</td></tr>";
  });
  document.getElementById("tableBody").innerHTML = html || "<tr><td colspan=\"6\" style=\"text-align:center;padding:32px;color:var(--text-dim)\">Sin resultados</td></tr>";
}

// Init
render();
</script>
</body>
</html>
